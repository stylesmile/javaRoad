##https
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  dapp.test.cy.com;
    gzip on;
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;
    gzip_min_length  1024;

    ssl_certificate /home/ubuntu/nginx-webui/.acme.sh/dapp.test.fcbalancer.com/fullchain.cer;
    ssl_certificate_key /home/ubuntu/nginx-webui/.acme.sh/dapp.test.fcbalancer.com/dapp.test.fcbalancer.com.key;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout  10m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    client_max_body_size 10000m;

    # Load configuration files for the default server block.
    # include /etc/nginx/default.d/*.conf;


    location ^~ / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        #proxy_set_header Host $http_host:9000;

        proxy_connect_timeout 3000;
        # Default is HTTP/1, keepalive is only enabled in HTTP/1.1
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_pass http://127.0.0.1:801/;
    }

}